apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: bank-dwh
  labels:
    app: prometheus
spec:
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  selector:
    app: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: bank-dwh
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: bank-dwh
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: bank-dwh
  labels:
    app: grafana
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: bank-dwh
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bank-dwh-secrets
                  key: grafana-admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: http://localhost:3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-yml
              mountPath: /etc/grafana/provisioning/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-yml
          configMap:
            name: grafana-dashboards-provisioning
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-json
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: bank-dwh
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: bank-dwh
  labels:
    app: blackbox-exporter
spec:
  ports:
    - name: http
      port: 9115
      targetPort: 9115
  selector:
    app: blackbox-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: bank-dwh
  labels:
    app: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      containers:
        - name: blackbox
          image: prom/blackbox-exporter:v0.25.0
          args:
            - --config.file=/config/blackbox.yml
          ports:
            - containerPort: 9115
              name: http
          volumeMounts:
            - name: config
              mountPath: /config/blackbox.yml
              subPath: blackbox.yml
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
      volumes:
        - name: config
          configMap:
            name: blackbox-config
---
apiVersion: v1
kind: Service
metadata:
  name: statsd-exporter
  namespace: bank-dwh
  labels:
    app: statsd-exporter
spec:
  ports:
    - name: udp
      port: 8125
      protocol: UDP
      targetPort: 8125
    - name: tcp
      port: 8125
      protocol: TCP
      targetPort: 8125
    - name: metrics
      port: 9102
      targetPort: 9102
  selector:
    app: statsd-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: statsd-exporter
  namespace: bank-dwh
  labels:
    app: statsd-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statsd-exporter
  template:
    metadata:
      labels:
        app: statsd-exporter
    spec:
      containers:
        - name: statsd
          image: prom/statsd-exporter:v0.26.0
          args:
            - --statsd.listen-udp=:8125
            - --statsd.listen-tcp=:8125
          ports:
            - containerPort: 8125
              name: udp
              protocol: UDP
            - containerPort: 8125
              name: tcp
              protocol: TCP
            - containerPort: 9102
              name: metrics
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
