apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: bank-dwh
  labels:
    app: clickhouse
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  selector:
    app: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: bank-dwh
  labels:
    app: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      initContainers:
        - name: layout-init-sql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /out
              for f in /raw/*; do
                [ -f "$f" ] || continue
                k=$(basename "$f")
                case "$k" in
                  run-init.sh) dest="$k" ;;
                  *) dest=$(echo "$k" | sed 's|__|/|g') ;;
                esac
                mkdir -p "/out/$(dirname "$dest")"
                cp "$f" "/out/$dest"
              done
          volumeMounts:
            - name: init-sql-raw
              mountPath: /raw
              readOnly: true
            - name: init-sql-work
              mountPath: /out
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8-alpine
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: bank_marts
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bank-dwh-secrets
                  key: clickhouse-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init-sql-work
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: init-sql-raw
          configMap:
            name: clickhouse-init-sql
        - name: init-sql-work
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-exporter
  namespace: bank-dwh
  labels:
    app: clickhouse-exporter
spec:
  ports:
    - name: metrics
      port: 9116
      targetPort: 9116
  selector:
    app: clickhouse-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-exporter
  namespace: bank-dwh
  labels:
    app: clickhouse-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse-exporter
  template:
    metadata:
      labels:
        app: clickhouse-exporter
    spec:
      containers:
        - name: exporter
          image: f1yegor/clickhouse-exporter:latest
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bank-dwh-secrets
                  key: clickhouse-password
          command:
            - /bin/sh
            - -c
            - exec /usr/local/bin/clickhouse_exporter -scrape_uri=http://default:$${CLICKHOUSE_PASSWORD}@clickhouse:8123/
          ports:
            - containerPort: 9116
              name: metrics
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
