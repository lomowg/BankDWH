apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bank-dwh
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bank-dwh
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "dwh"
            - name: POSTGRES_DB
              value: "bank_dwh"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bank-dwh-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U dwh -d bank_dwh
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U dwh -d bank_dwh
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-dwh
  namespace: bank-dwh
  labels:
    app: postgres-exporter-dwh
spec:
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
  selector:
    app: postgres-exporter-dwh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter-dwh
  namespace: bank-dwh
  labels:
    app: postgres-exporter-dwh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter-dwh
  template:
    metadata:
      labels:
        app: postgres-exporter-dwh
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.17.1
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: bank-dwh-secrets
                  key: postgres-exporter-dwh-dsn
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
---
