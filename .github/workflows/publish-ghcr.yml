name: Publish images to GHCR

on:
  push:
    branches: [main, master]
    paths:
      - "Dockerfile.airflow.k8s"
      - "airflow/**"
      - "data/sample/**"
      - "data/datasets/**"
      - "analytics_api/**"
      - ".github/workflows/publish-ghcr.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  AIRFLOW_TAG: "2.10.4-python3.12"
  ANALYTICS_TAG: "1.0"

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Registry prefix (lowercase)
        id: reg
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.airflow.k8s
          push: true
          tags: |
            ${{ steps.reg.outputs.prefix }}/bank-dwh-airflow:${{ env.AIRFLOW_TAG }}
            ${{ steps.reg.outputs.prefix }}/bank-dwh-airflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Analytics API image
        uses: docker/build-push-action@v6
        with:
          context: ./analytics_api
          file: ./analytics_api/Dockerfile
          push: true
          tags: |
            ${{ steps.reg.outputs.prefix }}/bank-dwh-analytics-api:${{ env.ANALYTICS_TAG }}
            ${{ steps.reg.outputs.prefix }}/bank-dwh-analytics-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
